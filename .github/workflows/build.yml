name: Build Unsigned IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # Tells the cloud to download your 202MB library file

      - name: Build Xcode Project
        run: |
          xcodebuild -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR=build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Package into IPA
        run: |
          mkdir Payload
          cp -r build/Unity-iPhone.app Payload/
          zip -r Game.ipa Payload

          # Quick fallback if the path structure varies
          if [ ! -f Game.ipa ]; then
            echo "An error occurred packaging the app." && exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          path: Game.ipa